name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev automake autopoint gettext \
          build-essential libsqlite3-dev
        # Взято из требований https://buildozer.readthedocs.io/en/latest/installation/

      - name: Install Python Packages
        run: |
          pip install --upgrade pip
          pip install --upgrade "cython<3.0" setuptools  # Cython ниже 3.0 критичен для p4a
          pip install git+https://github.com/kivy/buildozer.git@master

      - name: Build with Buildozer
        run: |
          yes | buildozer android debug
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk
          
